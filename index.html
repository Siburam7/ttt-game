<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="pratice.css">
    <script src="notfy.js" defer></script>
</head>
<body>
    <div class="nav">
        <div class="boox boox-a1">
            <i class="fa-solid fa-angle-left"></i>
            <i class="fa-solid fa-door-open"></i>
        </div>

        <div class="boox boox-a2">
            <div class="dark">
                <i class="fa-solid fa-moon"></i>
            </div>
            
            <div class="light">
                <i class="fa-regular fa-moon"></i>
            </div>
        </div>

        <div class="boox boox-a3">
            <i class="fa-solid fa-gear"></i>
        </div>
    </div>

    <div class="contener">
        <div class="main-box">
            <div class="box0 slc0"></div> 
            <div class="box0 slc1"></div> 
            <div class="box0 slc2"></div> 
            <div class="box0 slc3"></div> 
            <div class="box0 slc4"></div> 
            <div class="box0 slc5"></div> 
            <div class="box0 slc6"></div> 
            <div class="box0 slc7"></div> 
            <div class="box0 slc8"></div> 
        </div>

        <div class="option-no">
            <div class="op1">
                <h1 class="crazy">Got scared?</h1>
                <h4>huhhh!</h4>
            </div>
        </div>
        


        <div class="option">
            <div class="op1">
                <h1 class="winner-name">Winner X</h1>
                <h4>Play Again?</h4>
            </div>
            <div class="op2">
                <div class="yes1">Yes</div>
                <div class="no1">No</div>
            </div>
        </div>

    </div>

    <div class="main">
        <div class="content-z">
            <div class="booxx turn-no">
                <h3 class="turn-box">X Turn</h3>
            </div>
            
            <div class="booxx reset-game">
                <i class="fa-solid fa-arrow-rotate-left"></i>
            </div>
        </div>

        <div class="content-y">
            <div class="boxxx boxx-a1">SOLO</div>
            <div class="boxxx">COMPUTER</div>
            <div class="boxxx">DUO</div>
        </div>

        <div class="content">
            <div class="boxx">PLAYER (X)</div>
            <div class="boxx">TIE</div>
            <div class="boxx">PLAYER (O)</div>
        </div>

        <div class="content-x">
            <div class="boxx count-x">0</div>
            <div class="boxx count-tie">0</div>
            <div class="boxx count-o">0</div>
        </div>
        
    </div>

</body>
</html>
