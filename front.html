<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="front.css">
    <script src="front.js" defer></script>
</head>
<body>

    <div class="game-con">
        <div class="img-boxx"></div>

        <h2 class="heading-text">Tic Tac Toe Online</h2>

        <div class="rating-bord">
            <div class="rating">
                <i class="fa-solid fa-star-half-stroke"></i>
                <h4>8.4/10</h4>
            </div>

            <div class="board">
                <i class="fa-solid fa-chess-pawn"></i>
                <h4>Board</h4>
            </div>
        </div>

        <div class="play-now">
            <i class="fa-solid fa-gamepad"></i>
            <h2>Play now</h2>
        </div>

        <div class="foot-line">
            <div class="like-nonlike">
                <div class="like">
                    <i  id="like-before" class="fa-regular fa-thumbs-up"></i>
                    <i  id="like-after" class="fa-solid fa-thumbs-up"></i>
                    <h4>24K</h4>
                </div>
                
                <div class="non-like">
                    <i id="dis-like-before"  class="fa-regular fa-thumbs-down"></i>
                    <i  id="dis-like-after"  class="fa-solid fa-thumbs-down"></i>
                </div>

            </div>

            <div class="fab-box">
                <i  id="love-before" class="fa-regular fa-heart"></i>
                <i  id="love-after" class="fa-solid fa-heart"></i>
            </div>

            <div class="share-box">
                <i class="fa-regular fa-share-from-square"></i>
            </div>

            <div class="feeedback-box">
                <i class="fa-regular fa-message"></i>
            </div>


        </div>
    </div>
</body>
</html>
